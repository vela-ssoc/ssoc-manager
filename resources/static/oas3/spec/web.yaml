      x-stoplight:
        id: lrfdl2sys7zb6
      type: string
      description: 证书私钥
      example: |-
        -----BEGIN PRIVATE KEY-----
        MIG/AgEAMBAGByqGSM49AgEGBSuBBAAiBIGnMIGkAgEBBDBPg9Sqc/whBbMlhqfG
