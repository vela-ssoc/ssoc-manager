  parameters:
    HexIDs:
      name: id
      in: query
      required: true
      schema:
        uniqueItems: true
        type: array
        example:
          - 698991bdeaeb0d0435aa5471
          - 698991bdeaeb0d0435aa5472
      description: |-
        ID（允许多个）
        - `http`: id=698991bdeaeb0d0435aa5471&id=698991bdeaeb0d0435aa5472
        - `stoplight`: ["698991bdeaeb0d0435aa5471", "698991bdeaeb0d0435aa5472"]
    HexID:
      name: id
      in: query
      required: true
      schema:
        type: string
        example: 698991bdeaeb0d0435aa547f
      description: ID
    OptionalHexIDs:
      name: id
      in: query
      required: false
      schema:
        type: array
        uniqueItems: true
        example:
          - 698991bdeaeb0d0435aa5471
          - 698991bdeaeb0d0435aa5472
      description: |-
        ID（允许多个）
        - `http`: id=698991bdeaeb0d0435aa5471&id=698991bdeaeb0d0435aa5472
        - `stoplight`: ["698991bdeaeb0d0435aa5471", "698991bdeaeb0d0435aa5472"]
